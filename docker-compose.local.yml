# 本地编译版（含飞书同步）。使用 build/Dockerfile.local 从源码构建。
#   docker compose -f docker-compose.local.yml up -d --build
services:
  openvpn:
    image: openvpn-web:local
    build:
      context: .
      dockerfile: build/Dockerfile.local
    cap_add:
      - NET_ADMIN
    ports:
      - "1194:1194/udp"
      - "8833:8833"
    environment:
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin
      - OVPN_GATEWAY=false
      # 容器内非 Go 进程（openvpn/easyrsa/supervisord 等）使用的时区。
      # Go 进程时间显示由 main.go init() 中 time.Local = Asia/Shanghai 强制固定。
      - TZ=Asia/Shanghai
      # NAT/外网暴露场景：生成的 .ovpn 指向真实外网可达地址（留空则自动探测本机出网 IP/端口）
      # - OVPN_REMOTE_ADDR=203.0.113.10
      # - OVPN_REMOTE_PORT=1194
    volumes:
      - ./data:/data
      - /etc/localtime:/etc/localtime:ro
    # 用公共 DNS，避免 Docker 内嵌 DNS(127.0.0.11) 解析外部域名瞬时 "server misbehaving" 导致发邮件等失败
    dns:
      - 223.5.5.5
      - 8.8.8.8
